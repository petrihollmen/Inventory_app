<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory Manager</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
          <line x1="12" y1="22.08" x2="12" y2="12"/>
        </svg>
        <span>Inventory Manager</span>
      </div>
      <button class="btn btn-primary" id="addProductBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Add Product
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main">
    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat-card">
        <span class="stat-label">Total Products</span>
        <span class="stat-value" id="statTotal">—</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Total Items</span>
        <span class="stat-value" id="statItems">—</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Low Stock</span>
        <span class="stat-value warning" id="statLowStock">—</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Total Value</span>
        <span class="stat-value" id="statValue">—</span>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Search by name, SKU or description…" />
      </div>
      <select id="categoryFilter" class="select-filter">
        <option value="">All Categories</option>
      </select>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table class="inventory-table" id="inventoryTable">
        <thead>
          <tr>
            <th>Product</th>
            <th>SKU</th>
            <th>Category</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr class="loading-row">
            <td colspan="6"><div class="spinner"></div></td>
          </tr>
        </tbody>
      </table>
      <div id="emptyState" class="empty-state" style="display:none;">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        </svg>
        <p>No products found</p>
        <span>Try adjusting your search or add a new product</span>
      </div>
    </div>
  </main>

  <!-- Add / Edit Product Modal -->
  <div class="modal-overlay" id="productModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Add Product</h2>
        <button class="modal-close" id="modalClose" aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <form id="productForm" novalidate>
        <input type="hidden" id="productId" />
        <div class="form-grid">
          <div class="form-group">
            <label for="fieldName">Product Name <span class="required">*</span></label>
            <input type="text" id="fieldName" placeholder="e.g. Wireless Keyboard" required />
            <span class="field-error" id="errName"></span>
          </div>
          <div class="form-group">
            <label for="fieldSku">SKU <span class="required">*</span></label>
            <input type="text" id="fieldSku" placeholder="e.g. ELEC-001" required />
            <span class="field-error" id="errSku"></span>
          </div>
          <div class="form-group">
            <label for="fieldCategory">Category <span class="required">*</span></label>
            <input type="text" id="fieldCategory" list="categoryList" placeholder="e.g. Electronics" required />
            <datalist id="categoryList"></datalist>
            <span class="field-error" id="errCategory"></span>
          </div>
          <div class="form-group">
            <label for="fieldPrice">Price ($) <span class="required">*</span></label>
            <input type="number" id="fieldPrice" min="0" step="0.01" placeholder="0.00" required />
            <span class="field-error" id="errPrice"></span>
          </div>
          <div class="form-group">
            <label for="fieldQuantity">Quantity <span class="required">*</span></label>
            <input type="number" id="fieldQuantity" min="0" step="1" placeholder="0" required />
            <span class="field-error" id="errQuantity"></span>
          </div>
          <div class="form-group full-width">
            <label for="fieldDescription">Description</label>
            <textarea id="fieldDescription" rows="2" placeholder="Optional product description"></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
          <button type="submit" class="btn btn-primary" id="saveBtn">Save Product</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay" id="deleteModal" role="dialog" aria-modal="true" aria-labelledby="deleteTitle" style="display:none;">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2 class="modal-title" id="deleteTitle">Delete Product</h2>
        <button class="modal-close" id="deleteModalClose" aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="delete-body">
        <div class="delete-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
        </div>
        <p>Are you sure you want to delete <strong id="deleteProductName"></strong>?</p>
        <p class="delete-note">This action cannot be undone.</p>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-secondary" id="deleteCancelBtn">Cancel</button>
        <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast" role="alert" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
